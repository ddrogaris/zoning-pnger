<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoning Chart Exporter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 280px;
      background: #fafafa;
      color: #1a1a1a;
    }

    .header {
      background: #1d3557;
      color: white;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      font-size: 20px;
      line-height: 1;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .header-text p {
      font-size: 10px;
      opacity: 0.75;
      margin-top: 1px;
    }

    .body {
      padding: 14px 16px;
    }

    #status-box {
      background: #e9f0fb;
      border: 1px solid #b8ceec;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 12px;
      color: #1d3557;
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    #status-box.error {
      background: #fdecea;
      border-color: #f5b7b1;
      color: #c0392b;
    }

    #status-box.success {
      background: #eafaf1;
      border-color: #a9dfbf;
      color: #1e7e34;
    }

    #status-box.working {
      background: #fef9e7;
      border-color: #f9e79f;
      color: #7d6608;
    }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #1d3557;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .spinner.visible {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #export-btn {
      width: 100%;
      padding: 10px;
      background: #1d3557;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s ease;
    }

    #export-btn:hover:not(:disabled) {
      background: #2a4a7f;
    }

    #export-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .chart-list {
      margin-top: 10px;
      font-size: 11px;
      color: #555;
      max-height: 120px;
      overflow-y: auto;
    }

    .chart-list-item {
      padding: 3px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chart-list-item:last-child {
      border-bottom: none;
    }

    .chart-list-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .chart-list-item .dot.done {
      background: #27ae60;
    }

    .chart-list-item .dot.error {
      background: #e74c3c;
    }

    .footer {
      padding: 8px 16px 10px;
      font-size: 10px;
      color: #999;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🗺️</div>
    <div class="header-text">
      <h1>Zoning Chart Exporter</h1>
      <p>National Zoning Atlas — Snapshot Tool</p>
    </div>
  </div>

  <div class="body">
    <div id="status-box">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">Navigate to a zoning snapshot page to begin.</span>
    </div>

    <button id="export-btn" disabled>Export Charts as ZIP</button>

    <div class="chart-list" id="chart-list"></div>
  </div>

  <div class="footer">
    Saves one PNG per chart · 2× resolution · zipped
  </div>

  <script src="popup.js"></script>
</body>
</html>
